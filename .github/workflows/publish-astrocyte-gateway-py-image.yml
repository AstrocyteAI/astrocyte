# Build + test gate, then push the multi-arch astrocyte-gateway-py image to GHCR (version tag).
# Gateway test gate lives in `gateway-publish-test-gate.yml` (shared with `ci.yml`).
#
# Invoked by `release.yml` after PyPI publishes (`publish.yml` → `publish-astrocyte-postgres.yml`).
# Image uses `Dockerfile.release` (astrocyte + astrocyte-postgres from PyPI at this tag’s version).
name: Publish astrocyte-gateway-py image to GHCR

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  test-astrocyte-py:
    # Job `name` cannot use `env`; keep "3.12" in sync with env.PYTHON_VERSION above.
    name: astrocyte-py (Python 3.12)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Test astrocyte-py
        working-directory: astrocyte-py
        run: uv sync --extra dev && uv run python -m pytest

  gateway-publish-test-gate:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/gateway-publish-test-gate.yml

  wait-for-pypi:
    name: Wait for PyPI availability
    needs:
      - test-astrocyte-py
      - gateway-publish-test-gate
    runs-on: ubuntu-latest
    steps:
      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Wait for astrocyte and astrocyte-postgres on PyPI
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Poll via pip download — checks the simple index, the same path pip uses
          # at Docker build time. The JSON API can return 200 before the simple index
          # propagates to all CDN nodes, so JSON-only checks are unreliable here.
          # astrocyte-age removed from the wait list in M9 (ADR-008).
          for pkg in astrocyte astrocyte-postgres; do
            echo "Waiting for ${pkg}==${VERSION} to be pip-downloadable..."
            for i in $(seq 1 40); do
              if pip download "${pkg}==${VERSION}" --no-deps -q -d /tmp/pypi-check; then
                echo "✓ ${pkg}==${VERSION} available"
                rm -rf /tmp/pypi-check
                break
              fi
              if [ "$i" = "40" ]; then
                echo "✗ ${pkg}==${VERSION} not available after ~6 minutes"
                exit 1
              fi
              echo "  Attempt ${i}/40 — ${pkg}==${VERSION} not yet available, retrying in 10s..."
              sleep 10
            done
          done

  build-and-push:
    name: Build and push image
    needs:
      - wait-for-pypi
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write  # upload Trivy SARIF to the Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Version from tag (for Docker build-args)
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            # OCI image names must be lowercase; bash 4+ (ubuntu-latest)
            echo "repository_lc=${GITHUB_REPOSITORY,,}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: astrocyte-services-py/astrocyte-gateway-py/Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            ASTROCYTE_VERSION=${{ steps.meta.outputs.version }}
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.meta.outputs.version }}

      - name: Attest image (SLSA provenance → GHCR)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Supply-chain: generate an SPDX SBOM from the pushed image and attest it
      # to GHCR alongside the provenance (verify with `gh attestation verify` or
      # `cosign download sbom`).
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM (→ GHCR)
        uses: actions/attest-sbom@v2
        with:
          subject-name: ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      # Vulnerability scan. SARIF always uploads to the Security tab for
      # visibility; the gate below fails the release only on FIXABLE
      # CRITICAL/HIGH findings (ignore-unfixed) so a base-image CVE with no
      # patch yet does not block shipping. Tune severity / drop the gate step
      # if this proves too strict for a given release cadence.
      - name: Scan image (Trivy → SARIF)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-image

      - name: Fail on fixable CRITICAL/HIGH vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py@${{ steps.push.outputs.digest }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
