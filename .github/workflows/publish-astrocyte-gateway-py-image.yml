# Build + test gate, then push the astrocyte-gateway-py image to GHCR (version tag).
# Gateway test gate lives in `gateway-publish-test-gate.yml` (shared with `ci.yml`).
#
# Invoked by `release.yml` after PyPI publishes (`publish.yml` → `publish-astrocyte-pgvector.yml`).
# Image uses `Dockerfile.release` (astrocyte + astrocyte-pgvector from PyPI at this tag’s version).
name: Publish astrocyte-gateway-py image to GHCR

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  test-astrocyte-py:
    # Job `name` cannot use `env`; keep "3.12" in sync with env.PYTHON_VERSION above.
    name: astrocyte-py (Python 3.12)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Test astrocyte-py
        working-directory: astrocyte-py
        run: uv sync --extra dev && uv run python -m pytest

  gateway-publish-test-gate:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/gateway-publish-test-gate.yml

  wait-for-pypi:
    name: Wait for PyPI availability
    needs:
      - test-astrocyte-py
      - gateway-publish-test-gate
    runs-on: ubuntu-latest
    steps:
      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Wait for astrocyte, astrocyte-pgvector and astrocyte-age on PyPI
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Poll via pip download — checks the simple index, the same path pip uses
          # at Docker build time. The JSON API can return 200 before the simple index
          # propagates to all CDN nodes, so JSON-only checks are unreliable here.
          for pkg in astrocyte astrocyte-pgvector astrocyte-age; do
            echo "Waiting for ${pkg}==${VERSION} to be pip-downloadable..."
            for i in $(seq 1 40); do
              if pip download "${pkg}==${VERSION}" --no-deps -q -d /tmp/pypi-check; then
                echo "✓ ${pkg}==${VERSION} available"
                rm -rf /tmp/pypi-check
                break
              fi
              if [ "$i" = "40" ]; then
                echo "✗ ${pkg}==${VERSION} not available after ~6 minutes"
                exit 1
              fi
              echo "  Attempt ${i}/40 — ${pkg}==${VERSION} not yet available, retrying in 10s..."
              sleep 10
            done
          done

  build-and-push:
    name: Build and push image
    needs:
      - wait-for-pypi
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Version from tag (for Docker build-args)
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # OCI image names must be lowercase; bash 4+ (ubuntu-latest)
          echo "repository_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: astrocyte-services-py/astrocyte-gateway-py/Dockerfile.release
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            ASTROCYTE_VERSION=${{ steps.meta.outputs.version }}
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.meta.outputs.version }}

      - name: Attest image (SLSA provenance → GHCR)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.meta.outputs.repository_lc }}/astrocyte-gateway-py
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
