# One workflow file per PyPI project — required for Trusted Publishing OIDC subject matching.
# Do not merge into a matrix: PyPI + GitHub OIDC bind to this filename per project.
# Integration tests must pass before build/publish (same stack as ci.yml pgvector-integration).
name: Publish astrocyte-pgvector to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  test:
    name: Integration tests (PostgreSQL + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: astrocyte
          POSTGRES_PASSWORD: astrocyte
          POSTGRES_DB: astrocyte
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrocyte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pytest (astrocyte-pgvector)
        working-directory: adapters-storage-py/astrocyte-pgvector
        run: uv sync --extra dev && uv run python -m pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        working-directory: adapters-storage-py/astrocyte-pgvector
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-pgvector
          path: adapters-storage-py/astrocyte-pgvector/dist/

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-pgvector
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/astrocyte_pgvector-*"

  publish:
    needs: attest
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-pgvector
          path: dist/

      - name: Check if version already exists on PyPI
        id: check
        env:
          REF_VERSION: ${{ github.ref_name }}
        run: |
          V="${REF_VERSION#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/astrocyte-pgvector/$V/json")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
