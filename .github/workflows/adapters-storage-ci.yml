# Integration tests for optional Tier-1 storage adapters (Docker services).
name: Adapters (storage)

on:
  push:
    paths:
      - "adapters-storage-py/**"
      - ".github/workflows/adapters-storage-ci.yml"
  pull_request:
    paths:
      - "adapters-storage-py/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapters:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.17.0
        ports:
          - 6333:6333
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpass
        ports:
          - 7687:7687
          - 7474:7474
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -s http://localhost:9200 >/dev/null || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      ASTROCYTE_QDRANT_URL: http://localhost:6333
      ASTROCYTE_NEO4J_URI: bolt://localhost:7687
      ASTROCYTE_NEO4J_USER: neo4j
      ASTROCYTE_NEO4J_PASSWORD: testpass
      ASTROCYTE_ELASTICSEARCH_URL: http://localhost:9200

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Wait for Neo4j Bolt
        run: |
          for _ in $(seq 1 45); do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/7687' 2>/dev/null; then
              echo "neo4j bolt up"
              exit 0
            fi
            sleep 2
          done
          echo "neo4j bolt not reachable"
          exit 1

      - name: astrocyte-qdrant
        working-directory: adapters-storage-py/astrocyte-qdrant
        run: |
          uv sync --extra dev
          uv run pytest tests -v --override-ini="addopts="

      - name: astrocyte-neo4j
        working-directory: adapters-storage-py/astrocyte-neo4j
        run: |
          uv sync --extra dev
          uv run pytest tests -v --override-ini="addopts="

      - name: astrocyte-elasticsearch
        working-directory: adapters-storage-py/astrocyte-elasticsearch
        run: |
          uv sync --extra dev
          uv run pytest tests -v --override-ini="addopts="

  # AGE runs in its own job: the image is large and its service is PostgreSQL
  # (port 5432), so keeping it separate avoids port conflicts and lets it
  # pull / start in parallel with the other adapter tests.
  adapters-age:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      postgres-age:
        image: apache/age:v1.5.0-pg16
        env:
          POSTGRES_USER: astrocyte
          POSTGRES_PASSWORD: astrocyte
          POSTGRES_DB: astrocyte
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U astrocyte -d astrocyte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      ASTROCYTE_AGE_TEST_DSN: postgresql://astrocyte:astrocyte@localhost:5434/astrocyte

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: astrocyte-age
        working-directory: adapters-storage-py/astrocyte-age
        run: |
          uv sync --extra dev
          uv run pytest tests -v --override-ini="addopts="
