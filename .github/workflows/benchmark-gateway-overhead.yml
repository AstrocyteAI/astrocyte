# Manual-only: measures in-process ASGI gateway overhead vs direct brain.recall (see script docstring).
name: Benchmark gateway overhead

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Install gateway + dev (httpx)
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        run: uv sync --extra dev

      - name: Run benchmark
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        env:
          ASTROCYTE_AUTH_MODE: dev
        # Optional SLO gate: append e.g. `--max-overhead-p99-ms 10` (exit 2 if exceeded; tune per runner).
        run: uv run python scripts/bench_gateway_overhead.py --warmup 80 --iterations 1500 --json | tee bench-gateway-overhead.json

      - name: Summary
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        run: |
          echo "### Gateway overhead (JSON)" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat bench-gateway-overhead.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
