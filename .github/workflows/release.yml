# Single entrypoint for version tags: PyPI publishes in order, then the gateway image.
# Trusted Publishing still runs inside the per-project workflow files (publish.yml, etc.).
name: Release

on:
  push:
    tags:
      - "v*"

# Reusable workflows cannot request broader permissions than the caller grants.
# Child workflows need OIDC + attestations (PyPI Trusted Publishing, provenance) and
# packages:write for GHCR (gateway image).
permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

jobs:
  publish-astrocyte:
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish.yml
    secrets: inherit

  publish-postgres:
    needs: publish-astrocyte
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish-astrocyte-postgres.yml
    secrets: inherit

  # astrocyte-stack is a thin meta-package that pins ``astrocyte[default]``,
  # which transitively pins ``astrocyte-postgres``. It must publish AFTER
  # both so the version it references is resolvable on PyPI at install time.
  publish-stack:
    needs:
      - publish-astrocyte
      - publish-postgres
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish-astrocyte-stack.yml
    secrets: inherit

  # publish-age removed in M9 (ADR-008): Apache AGE is no longer a supported
  # graph backend. The astrocyte-age package + publish workflow were deleted.

  publish-postgres-image:
    needs:
      - publish-postgres
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/publish-astrocyte-postgres-image.yml
    secrets: inherit

  publish-gateway-image:
    needs:
      - publish-postgres-image
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish-astrocyte-gateway-py-image.yml
    secrets: inherit
