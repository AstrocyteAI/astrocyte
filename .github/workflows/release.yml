# Single entrypoint for version tags: PyPI publishes in order, then the gateway image.
# Trusted Publishing still runs inside the per-project workflow files (publish.yml, etc.).
name: Release

on:
  push:
    tags:
      - "v*"

# Reusable workflows cannot request broader permissions than the caller grants.
# Child workflows need OIDC + attestations (PyPI Trusted Publishing, provenance) and
# packages:write for GHCR (gateway image).
permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

jobs:
  publish-astrocyte:
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish.yml
    secrets: inherit

  publish-pgvector:
    needs: publish-astrocyte
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish-astrocyte-postgres.yml
    secrets: inherit

  publish-age:
    needs: publish-astrocyte
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish-astrocyte-age.yml
    secrets: inherit

  publish-postgres-image:
    needs:
      - publish-pgvector
      - publish-age
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/publish-astrocyte-postgres-image.yml
    secrets: inherit

  publish-gateway-image:
    needs:
      - publish-postgres-image
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    uses: ./.github/workflows/publish-astrocyte-gateway-py-image.yml
    secrets: inherit
