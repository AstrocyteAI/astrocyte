# Builds and pushes the combined PostgreSQL 16 + AGE + pgvector image to GHCR.
#
# This image is used as:
#   - The service container in the gateway pgvector+AGE integration test job
#   - The `postgres` service in docker-compose-age.yml for local dev
#
# Pushed tags:
#   ghcr.io/<org>/astrocyte/postgres-age-pgvector:latest   (always)
#   ghcr.io/<org>/astrocyte/postgres-age-pgvector:<vtag>   (on release tags)
#
# Triggered by:
#   - Changes to the Dockerfile (keeps `latest` fresh for CI)
#   - workflow_call from release.yml (pins a versioned tag)
#   - workflow_dispatch for manual rebuilds
name: Publish postgres-age-pgvector image to GHCR

on:
  push:
    paths:
      - ".github/workflows/publish-postgres-age-pgvector-image.yml"
      - "docker/postgres-age-pgvector/Dockerfile"
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          echo "repository_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          # On a version tag (e.g. v0.9.0) emit the tag; otherwise empty.
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (latest + optional version tag)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/postgres-age-pgvector/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.meta.outputs.repository_lc }}/postgres-age-pgvector:latest
            ${{ steps.meta.outputs.version_tag && format('ghcr.io/{0}/postgres-age-pgvector:{1}', steps.meta.outputs.repository_lc, steps.meta.outputs.version_tag) || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Attest image provenance
        if: steps.meta.outputs.version_tag != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.meta.outputs.repository_lc }}/postgres-age-pgvector
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
