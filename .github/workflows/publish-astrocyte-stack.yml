# One workflow file per PyPI project — required for Trusted Publishing OIDC subject matching.
# Do not merge into a matrix: PyPI + GitHub OIDC bind to this filename per project.
#
# astrocyte-stack is a *meta-package* — no Python code of its own; it only
# declares ``astrocyte[default]`` as a dependency so ``pip install astrocyte-stack``
# is the one-line install for the recommended Postgres-backed production stack.
# No integration tests needed at publish time — its surface is one
# pyproject.toml + an empty src/astrocyte_stack/__init__.py.
name: Publish astrocyte-stack to PyPI

# Invoked by `release.yml` after `publish.yml`. Manual runs: Actions → this workflow → Run workflow.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        working-directory: astrocyte-services-py/astrocyte-stack
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-stack
          path: astrocyte-services-py/astrocyte-stack/dist/

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-stack
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/astrocyte_stack-*"

  publish:
    needs: attest
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-stack
          path: dist/

      - name: Check if version already exists on PyPI
        id: check
        env:
          REF_VERSION: ${{ github.ref_name }}
        run: |
          V="${REF_VERSION#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/astrocyte-stack/$V/json")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
