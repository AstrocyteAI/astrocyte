name: Eval

on:
  schedule:
    - cron: "0 5 * * *" # Nightly at 5am UTC
  workflow_dispatch:
    inputs:
      suite:
        description: "Eval suite to run"
        default: "basic"
        type: choice
        options:
          - basic
          - accuracy

permissions:
  contents: write # needed to push eval history

jobs:
  eval:
    name: Run eval (${{ inputs.suite || 'basic' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: uv sync --extra dev

      - name: Run evaluation suite
        working-directory: astrocyte-py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run python scripts/run_eval.py \
            --suite "${{ inputs.suite || 'basic' }}" \
            --output eval-result.json

      - name: Check for regressions
        if: success()
        id: regression-check
        working-directory: astrocyte-py
        continue-on-error: true
        run: |
          BASELINE="../docs/public/eval/latest.json"
          if [ ! -f "$BASELINE" ]; then
            echo "No baseline found — skipping regression check."
            exit 0
          fi
          uv run python -c "
          import json, sys, os
          from astrocyte.eval.evaluator import detect_regressions
          from astrocyte.types import EvalMetrics

          with open('eval-result.json') as f:
              current_metrics = EvalMetrics(**json.load(f)['metrics'])
          with open('$BASELINE') as f:
              baseline_metrics = EvalMetrics(**json.load(f)['metrics'])

          alerts = detect_regressions(current_metrics, baseline_metrics)
          if not alerts:
              print('No regressions detected.')
              sys.exit(0)

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as out:
              out.write('\n## Regression Alerts\n\n')
              out.write('| Metric | Baseline | Current | Delta | Severity |\n')
              out.write('|--------|----------|---------|-------|----------|\n')
              for a in alerts:
                  icon = ':red_circle:' if a.severity == 'critical' else ':warning:'
                  out.write(f'| {a.metric} | {a.baseline_value:.4f} | {a.current_value:.4f} | {a.delta_percent:+.1%} | {icon} {a.severity} |\n')
              out.write('\n')

          has_critical = any(a.severity == 'critical' for a in alerts)
          for a in alerts:
              print(f'[{a.severity.upper()}] {a.metric}: {a.baseline_value:.4f} -> {a.current_value:.4f} ({a.delta_percent:+.1%})')
          if has_critical:
              print('::error::Critical regressions detected — see step summary.')
              sys.exit(1)
          "

      - name: Append to eval history
        if: success()
        run: |
          HISTORY_FILE="docs/public/eval/history.json"
          mkdir -p docs/public/eval

          # Initialize history if it doesn't exist
          if [ ! -f "$HISTORY_FILE" ]; then
            echo "[]" > "$HISTORY_FILE"
          fi

          # Append new result (metrics + metadata only, not per-query details)
          python3 -c "
          import json
          with open('astrocyte-py/eval-result.json') as f:
              result = json.load(f)
          # Strip per_query_results to keep history compact
          entry = {k: v for k, v in result.items() if k != 'per_query_results'}
          with open('$HISTORY_FILE') as f:
              history = json.load(f)
          history.append(entry)
          with open('$HISTORY_FILE', 'w') as f:
              json.dump(history, f, indent=2)
          "

          # Also write latest.json for quick access
          python3 -c "
          import json
          with open('astrocyte-py/eval-result.json') as f:
              result = json.load(f)
          summary = {k: v for k, v in result.items() if k != 'per_query_results'}
          with open('docs/public/eval/latest.json', 'w') as f:
              json.dump(summary, f, indent=2)
          "

      - name: Commit eval history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/public/eval/history.json docs/public/eval/latest.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "eval: update history (${{ inputs.suite || 'basic' }} $(date -u +%Y-%m-%d))"
          git push

      - name: Post summary
        if: always()
        run: |
          if [ -f astrocyte-py/eval-result.json ]; then
            echo "## Eval Results" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          with open('astrocyte-py/eval-result.json') as f:
              data = json.load(f)
          summary = {k: v for k, v in data.items() if k != 'per_query_results'}
          print(json.dumps(summary, indent=2))
          " >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Eval Results" >> "$GITHUB_STEP_SUMMARY"
            echo "Eval run failed — no results produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload eval artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-result-${{ inputs.suite || 'basic' }}-${{ github.run_number }}
          path: astrocyte-py/eval-result.json
          if-no-files-found: warn

      - name: Fail on critical regressions
        if: steps.regression-check.outcome == 'failure'
        run: |
          echo "::error::Workflow failing due to critical eval regressions."
          exit 1
