# One workflow file per PyPI project — required for Trusted Publishing OIDC subject matching.
# Unit tests must pass before build/publish (same stack as adapters-ingestion-ci.yml redis leg).
name: Publish astrocyte-ingestion-redis to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  test:
    name: Unit tests (astrocyte-ingestion-redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pytest (astrocyte-ingestion-redis)
        working-directory: adapters-ingestion-py/astrocyte-ingestion-redis
        run: |
          uv sync --extra dev
          uv run pytest tests -v --override-ini="addopts="

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pin version in pyproject.toml
        working-directory: adapters-ingestion-py/astrocyte-ingestion-redis
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Build package
        working-directory: adapters-ingestion-py/astrocyte-ingestion-redis
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-ingestion-redis
          path: adapters-ingestion-py/astrocyte-ingestion-redis/dist/

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-ingestion-redis
          path: dist/

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/astrocyte_ingestion_redis-*"

  publish:
    needs: attest
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-ingestion-redis
          path: dist/

      - name: Check if version already exists on PyPI
        id: check
        env:
          REF_VERSION: ${{ github.ref_name }}
        run: |
          V="${REF_VERSION#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/astrocyte-ingestion-redis/$V/json")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
