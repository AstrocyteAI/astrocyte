# Shared test gate for astrocyte-gateway-py: services checks, example matrix, Postgres + pgvector.
# Called from `ci.yml`, `publish-astrocyte-gateway-py-image.yml`, and `release.yml` — change once, all stay aligned.
name: gateway publish test gate

on:
  workflow_call:

# Least privilege for checkout + local tests (no registry push or PR writes).
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  services-ci:
    name: Services CI (compose, shell, astrocyte-gateway-py)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run services checks
        run: make -C astrocyte-services-py ci-shell ci-compose ci-gateway-tests

  gateway-examples-matrix:
    name: gateway example ${{ matrix.example }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - tier1-minimal
          - tier1-with-mip
          - mip-education
          - webhook-ingest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Smoke test example config
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        env:
          GATEWAY_EXAMPLE_MATRIX: ${{ matrix.example }}
        run: |
          uv sync --extra dev --extra pgvector
          uv run python -m pytest tests/test_gateway_examples_smoke.py -v --tb=short

  pgvector-integration:
    name: pgvector integration
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: astrocyte
          POSTGRES_PASSWORD: astrocyte
          POSTGRES_DB: astrocyte
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrocyte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install psql (migrations)
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      - name: Migrate Postgres (pgvector SQL)
        run: adapters-storage-py/astrocyte-pgvector/scripts/migrate.sh
        env:
          DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte

      - name: Test astrocyte-pgvector
        working-directory: adapters-storage-py/astrocyte-pgvector
        run: uv sync --extra dev && uv run python -m pytest

      - name: Gateway E2E (HTTP + pgvector, migrated schema)
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        env:
          DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
          ASTROCYTE_GATEWAY_E2E_MIGRATED: "1"
        run: |
          uv sync --extra dev --extra pgvector
          uv run python -m pytest tests/test_integration_pgvector_http.py -v --tb=short

      - name: Gateway example smoke (tier1-pgvector)
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        env:
          DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
          ASTROCYTE_GATEWAY_E2E_MIGRATED: "1"
          GATEWAY_EXAMPLE_MATRIX: tier1-pgvector
        run: |
          uv sync --extra dev --extra pgvector
          uv run python -m pytest tests/test_gateway_examples_smoke.py -v --tb=short

  pgvector-age-integration:
    name: pgvector + AGE integration (combined image)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
      ASTROCYTE_AGE_DSN: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
      ASTROCYTE_GRAPH_STORE: age
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build astrocyte-postgres image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/astrocyte-postgres/Dockerfile
          push: false
          load: true
          tags: astrocyte/astrocyte-postgres:local

      - name: Start postgres container
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=astrocyte \
            -e POSTGRES_PASSWORD=astrocyte \
            -e POSTGRES_DB=astrocyte \
            -p 5432:5432 \
            astrocyte/astrocyte-postgres:local

      - name: Wait for postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U astrocyte -d astrocyte; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          docker logs postgres
          exit 1

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install psql (migrations)
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      - name: Migrate Postgres (pgvector SQL)
        run: adapters-storage-py/astrocyte-pgvector/scripts/migrate.sh
        env:
          DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte

      - name: Test astrocyte-pgvector (combined image)
        working-directory: adapters-storage-py/astrocyte-pgvector
        run: uv sync --extra dev && uv run python -m pytest

      - name: Test astrocyte-age (combined image)
        working-directory: adapters-storage-py/astrocyte-age
        env:
          ASTROCYTE_AGE_TEST_DSN: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
        run: uv sync --extra dev && uv run python -m pytest

      - name: Gateway E2E (HTTP + pgvector + AGE, combined image)
        working-directory: astrocyte-services-py/astrocyte-gateway-py
        env:
          DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
          ASTROCYTE_AGE_DSN: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
          ASTROCYTE_GRAPH_STORE: age
          ASTROCYTE_GATEWAY_E2E_MIGRATED: "1"
        run: |
          uv sync --extra dev --extra pgvector --extra age
          uv run python -m pytest tests/test_integration_pgvector_http.py -v --tb=short
