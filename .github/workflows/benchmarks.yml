name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      quick:
        description: "Quick run — stratified sample (locomo: 50q, longmemeval: 100q). Full run if false."
        required: false
        default: "false"
        type: boolean
      benchmarks:
        description: "Which benchmarks to run (comma-separated: longmemeval,locomo). 'builtin' is accepted for backwards-compat but no-ops."
        required: false
        default: "longmemeval,locomo"
        type: string
  # Secrets arrive via the Doppler -> GitHub Actions sync (Doppler project
  # `astrocyte`, config `bench`) — no service token, no Doppler CLI at
  # runtime. Rotations in Doppler re-sync automatically.
  schedule:
    - cron: "0 6 * * 1"   # Weekly Monday 6am UTC — always full run

permissions:
  contents: read
  actions: write

jobs:
  matrix-setup:
    name: Configure benchmark matrix
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT="${{ inputs.benchmarks || 'longmemeval,locomo' }}"
          # Convert comma-separated string to JSON array
          JSON=$(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
          echo "matrix={\"benchmark\":$JSON}" >> "$GITHUB_OUTPUT"

  benchmark:
    name: "Run: ${{ matrix.benchmark }}"
    needs: matrix-setup
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        # ``bench`` extra adds the Postgres + ingestion + OpenAI + aiobotocore
        # stack the benchmark run needs on top of the slim ``dev`` extra.
        # ``rerank`` (sentence-transformers/torch) is required too: the bench
        # config enables cross_encoder_rerank, and without the package the
        # runner silently falls back to semantic order — depressing scores
        # vs the archived trajectory (observed -4pts on a local smoke).
        run: uv sync --extra bench --extra rerank

      - name: Run ${{ matrix.benchmark }} benchmark
        working-directory: astrocyte-py
        # Doppler stays the source of truth; its GitHub sync materializes the
        # secrets here. BENCH_SECRETS_WRAPPER= (empty) skips the local-dev
        # `doppler run --` wrapper in the Makefile bench targets.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BENCH_SECRETS_WRAPPER: ""
        run: |
          # Scheduled runs are always full; manual runs respect the quick input.
          # The Makefile exposes question-count knobs (LOCOMO_MAX_Q,
          # LME_MAX_SAMPLES) — quick mode caps each leg to a small sample
          # for fast iteration; full mode uses the defaults.
          QUICK="${{ inputs.quick || 'false' }}"
          case "${{ matrix.benchmark }}" in
            locomo)
              if [ "$QUICK" = "true" ]; then
                make bench-locomo LOCOMO_MAX_Q=5
              else
                make bench-locomo
              fi
              ;;
            longmemeval)
              if [ "$QUICK" = "true" ]; then
                make bench-longmemeval LME_MAX_SAMPLES=100
              else
                make bench-longmemeval
              fi
              ;;
            builtin)
              echo "::warning::'builtin' benchmark was removed in the PageIndex bench refactor — skipping."
              ;;
          esac

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ matrix.benchmark }}
          path: astrocyte-py/benchmark-results/

  summarize:
    name: Aggregate results
    needs: benchmark
    if: always()
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all result artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-results-*
          path: all-results
          merge-multiple: true

      - name: Merge and summarize
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY

          # Merge all latest.json files into one combined result
          python3 -c "
          import json, glob, os

          combined = {}
          for f in sorted(glob.glob('all-results/*.json')):
              if os.path.basename(f) == 'latest.json':
                  continue
              with open(f) as fh:
                  data = json.load(fh)
              for key, val in data.items():
                  if key != '_meta':
                      combined[key] = val
                  elif '_meta' not in combined:
                      combined['_meta'] = val

          if not combined:
              print('No results found.')
          else:
              # Print summary without per-question details
              summary = {}
              for key, val in combined.items():
                  if key == '_meta':
                      summary[key] = val
                  elif isinstance(val, dict) and 'overall_accuracy' in val:
                      summary[key] = {
                          'overall_accuracy': val['overall_accuracy'],
                          'correct': val.get('correct'),
                          'total_questions': val.get('total_questions'),
                          'category_accuracy': val.get('category_accuracy'),
                          'metrics': val.get('metrics'),
                      }
                  elif isinstance(val, dict):
                      summary[key] = val
              print(json.dumps(summary, indent=2, default=str))
          " > summary.json

          # Also produce the merged file the regression gate consumes
          # (unwrapped "combined" dict, not the summary-only version).
          python3 -c "
          import json, glob, os
          combined = {}
          for f in sorted(glob.glob('all-results/*.json')):
              if os.path.basename(f) == 'latest.json':
                  continue
              with open(f) as fh:
                  data = json.load(fh)
              for key, val in data.items():
                  if key != '_meta':
                      combined[key] = val
                  elif '_meta' not in combined:
                      combined['_meta'] = val
          with open('combined-latest.json', 'w') as fh:
              json.dump(combined, fh, indent=2)
          "

          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat summary.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # No automated regression gate (intentionally). The v0.x bench
      # harness had one (scripts/check_benchmark_regression.py +
      # benchmarks/baselines-*.json) but both were removed in ee794d0
      # along with the rest of the v0.x scaffolding. The PageIndex
      # harness uses the R2 archive as the source of truth for trajectory
      # — run ``make bench-archive-trajectory BENCH=<name>`` to inspect
      # per-day overall + per-category scores. Release-gate reviews
      # happen out-of-band against the archive.

      - name: Upload combined results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-combined
          path: all-results/
