name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      max_questions:
        description: "Max questions per benchmark (default: 200, 0 for full run)"
        required: false
        default: "200"
        type: string
      benchmarks:
        description: "Which benchmarks to run (comma-separated: builtin,longmemeval,locomo)"
        required: false
        default: "builtin,longmemeval,locomo"
        type: string
  schedule:
    # Weekly Monday 6am UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  actions: write

jobs:
  matrix-setup:
    name: Configure benchmark matrix
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT="${{ inputs.benchmarks || 'builtin,longmemeval,locomo' }}"
          # Convert comma-separated string to JSON array
          JSON=$(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
          echo "matrix={\"benchmark\":$JSON}" >> "$GITHUB_OUTPUT"

  benchmark:
    name: "Run: ${{ matrix.benchmark }}"
    needs: matrix-setup
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download LongMemEval dataset
        if: matrix.benchmark == 'longmemeval'
        run: |
          git clone --depth 1 https://github.com/xiaowu0162/LongMemEval.git
          cd LongMemEval && mkdir -p data
          wget -q -P data/ https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_s_cleaned.json

      - name: Download LoCoMo dataset
        if: matrix.benchmark == 'locomo'
        run: |
          git clone --depth 1 https://github.com/snap-research/locomo.git

      - name: Install dependencies
        working-directory: astrocyte-py
        run: uv sync --extra dev

      - name: Install Doppler CLI
        # Doppler is the source of truth for secrets (see astrocyte prd
        # environment). The Astrocyte pattern is to run commands via
        # ``doppler run --`` locally and in CI — keeps secrets out of
        # workflow env blocks and under a single rotation story.
        uses: dopplerhq/cli-action@v3

      - name: Run ${{ matrix.benchmark }} benchmark
        working-directory: astrocyte-py
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_BENCHMARK_TOKEN }}
        run: |
          ARGS="--config benchmarks/config.yaml"
          ARGS="$ARGS --output-dir benchmark-results"
          ARGS="$ARGS --benchmarks ${{ matrix.benchmark }}"

          if [ "${{ matrix.benchmark }}" = "longmemeval" ]; then
            ARGS="$ARGS --longmemeval-path ../LongMemEval/data"
          fi

          if [ "${{ matrix.benchmark }}" = "locomo" ]; then
            ARGS="$ARGS --locomo-path ../locomo/data"
          fi

          # Default 200 questions for CI; pass 0 for a full run
          MAX_Q="${{ inputs.max_questions || '200' }}"
          if [ "$MAX_Q" != "0" ]; then
            ARGS="$ARGS --max-questions $MAX_Q"
          fi

          # DOPPLER_TOKEN selects the prd config automatically; no need
          # to pass --config prd. Service token should be scoped to the
          # benchmark-read role.
          doppler run -- uv run python scripts/run_benchmarks.py $ARGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ matrix.benchmark }}
          path: astrocyte-py/benchmark-results/

  summarize:
    name: Aggregate results
    needs: benchmark
    if: always()
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all result artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: benchmark-results-*
          path: all-results
          merge-multiple: true

      - name: Merge and summarize
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY

          # Merge all latest.json files into one combined result
          python3 -c "
          import json, glob, os

          combined = {}
          for f in sorted(glob.glob('all-results/*.json')):
              if os.path.basename(f) == 'latest.json':
                  continue
              with open(f) as fh:
                  data = json.load(fh)
              for key, val in data.items():
                  if key != '_meta':
                      combined[key] = val
                  elif '_meta' not in combined:
                      combined['_meta'] = val

          if not combined:
              print('No results found.')
          else:
              # Print summary without per-question details
              summary = {}
              for key, val in combined.items():
                  if key == '_meta':
                      summary[key] = val
                  elif isinstance(val, dict) and 'overall_accuracy' in val:
                      summary[key] = {
                          'overall_accuracy': val['overall_accuracy'],
                          'correct': val.get('correct'),
                          'total_questions': val.get('total_questions'),
                          'category_accuracy': val.get('category_accuracy'),
                          'metrics': val.get('metrics'),
                      }
                  elif isinstance(val, dict):
                      summary[key] = val
              print(json.dumps(summary, indent=2, default=str))
          " > summary.json

          # Also produce the merged file the regression gate consumes
          # (unwrapped "combined" dict, not the summary-only version).
          python3 -c "
          import json, glob, os
          combined = {}
          for f in sorted(glob.glob('all-results/*.json')):
              if os.path.basename(f) == 'latest.json':
                  continue
              with open(f) as fh:
                  data = json.load(fh)
              for key, val in data.items():
                  if key != '_meta':
                      combined[key] = val
                  elif '_meta' not in combined:
                      combined['_meta'] = val
          with open('combined-latest.json', 'w') as fh:
              json.dump(combined, fh, indent=2)
          "

          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat summary.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Checkout for baseline
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Regression gate — fail on score drop beyond tolerance
        # Does not block the matrix jobs; only surfaces in the summarize
        # step so the benchmark runs themselves always complete and
        # upload artifacts. The exit code here decides overall success.
        run: |
          cd repo/astrocyte-py
          uv sync --extra dev
          uv run python scripts/check_benchmark_regression.py \
              --baseline benchmarks/baselines-test-provider.json \
              --results ../../combined-latest.json

      - name: Upload combined results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-combined
          path: all-results/
