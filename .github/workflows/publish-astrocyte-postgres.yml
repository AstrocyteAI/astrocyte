# One workflow file per PyPI project — required for Trusted Publishing OIDC subject matching.
# Do not merge into a matrix: PyPI + GitHub OIDC bind to this filename per project.
# Integration tests must pass before build/publish (same stack as ci.yml postgres-integration).
name: Publish astrocyte-postgres to PyPI

# Invoked by `release.yml` after `publish.yml`. Manual runs: Actions → this workflow → Run workflow.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  test:
    name: Integration tests (PostgreSQL + pgvector)
    runs-on: ubuntu-latest
    services:
      # pgvector/pgvector:pg16 ships pgvector but not pgvectorscale.
      # Migration 001 runs `CREATE EXTENSION vectorscale`, which needs
      # the extension's control file + shared library on disk inside
      # the postgres container. We install them in the "Install
      # pgvectorscale into postgres service" step below, before
      # migrations run.
      #
      # Why install at runtime instead of swapping to our own
      # astrocyte-postgres image: the install is explicit (you can see
      # exactly what package is added), pgvectorscale doesn't require
      # shared_preload_libraries (no postgres restart needed), and it
      # keeps the test substrate honest — vanilla postgres + apt — vs
      # testing against our own image which is what we're building.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: astrocyte
          POSTGRES_PASSWORD: astrocyte
          POSTGRES_DB: astrocyte
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrocyte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ``test_postgres_bm25_idf.py`` (and other migration-path tests)
      # construct ``PostgresStore`` with ``bootstrap_schema=False`` so the
      # SQL migrations own DDL, mirroring production. Without this step the
      # tests fail with ``relation "public.astrocyte_banks" does not exist``
      # at the first ``store_vectors`` call.  Matches the pattern in
      # gateway-publish-test-gate.yml.
      - name: Install psql (migrations)
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      # The postgres service container (pgvector/pgvector:pg16) ships
      # pgvector but not pgvectorscale. Migration 001 needs
      # `vectorscale.control` and the matching `.so` on disk before
      # `CREATE EXTENSION vectorscale` can succeed.
      #
      # Install path mirrors docker/astrocyte-postgres/Dockerfile:
      # Tiger Data's packagecloud apt repo does NOT reliably ship
      # `postgresql-16-pgvectorscale` (broken on Trixie, also wasn't
      # found on Bookworm in CI even though their docs claim it ships
      # there). So we pull the release ZIP from GitHub, extract the
      # .deb, and dpkg-install. Pin the version so the substrate is
      # reproducible; bump in lockstep with the Dockerfile's
      # PGVECTORSCALE_VERSION build arg.
      #
      # No postgres restart is needed — pgvectorscale runs as a normal
      # extension and does not require shared_preload_libraries.
      - name: Install pgvectorscale into postgres service
        env:
          PGVECTORSCALE_VERSION: "0.9.0"
        run: |
          set -euxo pipefail
          # `docker exec -u 0` runs as root inside the container so we
          # can dpkg-install. ${{ job.services.postgres.id }} is the
          # service-container ID the runner spun up.
          docker exec -u 0 \
            -e PGVECTORSCALE_VERSION="${PGVECTORSCALE_VERSION}" \
            ${{ job.services.postgres.id }} bash -c '
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              ca-certificates curl unzip
            ARCH="$(dpkg --print-architecture)"
            cd /tmp
            curl -fsSL -o pgvectorscale.zip \
              "https://github.com/timescale/pgvectorscale/releases/download/${PGVECTORSCALE_VERSION}/pgvectorscale-${PGVECTORSCALE_VERSION}-pg16-${ARCH}.zip"
            mkdir -p pgvectorscale
            unzip -j pgvectorscale.zip -d pgvectorscale
            # The ZIP ships a main .deb plus a -dbgsym .deb (debug
            # symbols, ~60 KB). Install only the main package.
            dpkg -i $(find pgvectorscale -name "pgvectorscale-postgresql-16_*.deb" ! -name "*-dbgsym_*")
            rm -rf pgvectorscale pgvectorscale.zip
            # Confirm the control file is in place; failing here gives a
            # clearer error than the downstream migrate step would.
            test -f /usr/share/postgresql/16/extension/vectorscale.control
          '

      - name: Migrate Postgres (astrocyte-postgres SQL)
        run: adapters-storage-py/astrocyte-postgres/scripts/migrate.sh
        env:
          DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte

      - name: Run pytest (astrocyte-postgres)
        working-directory: adapters-storage-py/astrocyte-postgres
        run: uv sync --extra dev && uv run python -m pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        working-directory: adapters-storage-py/astrocyte-postgres
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-postgres
          path: adapters-storage-py/astrocyte-postgres/dist/

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-postgres
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/astrocyte_postgres-*"

  publish:
    needs: attest
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-postgres
          path: dist/

      - name: Check if version already exists on PyPI
        id: check
        env:
          REF_VERSION: ${{ github.ref_name }}
        run: |
          V="${REF_VERSION#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/astrocyte-postgres/$V/json")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
