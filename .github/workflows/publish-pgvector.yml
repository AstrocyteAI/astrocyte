name: Publish astrocyte-pgvector to PyPI

on:
  push:
    tags:
      - "v*"  # Aligned with astrocyte-py release tags

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for hatch-vcs to find tags

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        working-directory: astrocyte-services-py/astrocyte-pgvector
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.version }}
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-pgvector
          path: astrocyte-services-py/astrocyte-pgvector/dist/

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-pgvector
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/astrocyte_pgvector-*"

  publish:
    needs: [build, attest]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-pgvector
          path: dist/

      - name: Check if version already exists on PyPI
        id: check
        run: |
          VERSION=$(ls dist/*.whl | head -1 | sed 's/.*astrocyte_pgvector-\(.*\)-py3.*/\1/')
          echo "version=$VERSION"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/astrocyte-pgvector/$VERSION/json")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already exists on PyPI — skipping upload"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not on PyPI — proceeding with upload"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
