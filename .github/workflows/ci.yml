name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "astrocyte-py/**"
      - "adapters-ingestion-py/**"
      - "adapters-integration-py/**"
      - "adapters-storage-py/**"
      - "astrocyte-services-py/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/gateway-publish-test-gate.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/publish.yml"
      - ".github/workflows/publish-astrocyte-pgvector.yml"
      - ".github/workflows/publish-astrocyte-gateway-py-image.yml"
      - ".github/workflows/publish-astrocyte-ingestion-kafka.yml"
      - ".github/workflows/publish-astrocyte-ingestion-redis.yml"
      - ".github/workflows/publish-astrocyte-ingestion-github.yml"
      - ".github/workflows/publish-astrocyte-integration-tavus.yml"
  pull_request:
    paths:
      - "astrocyte-py/**"
      - "adapters-ingestion-py/**"
      - "adapters-integration-py/**"
      - "adapters-storage-py/**"
      - "astrocyte-services-py/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/gateway-publish-test-gate.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/publish.yml"
      - ".github/workflows/publish-astrocyte-pgvector.yml"
      - ".github/workflows/publish-astrocyte-gateway-py-image.yml"
      - ".github/workflows/publish-astrocyte-ingestion-kafka.yml"
      - ".github/workflows/publish-astrocyte-ingestion-redis.yml"
      - ".github/workflows/publish-astrocyte-ingestion-github.yml"
      - ".github/workflows/publish-astrocyte-integration-tavus.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  # Matches `requires-python` / classifiers in astrocyte-py/pyproject.toml
  astrocyte-py:
    name: astrocyte-py (Python ${{ matrix.python-version }})
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test astrocyte-py
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            uv run python -m pytest --cov=astrocyte --cov-report=json:coverage.json --cov-report=html:htmlcov --cov-report=term
          else
            uv run python -m pytest
          fi

      - name: Generate coverage badge JSON
        if: matrix.python-version == '3.12'
        working-directory: astrocyte-py
        run: |
          TOTAL=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          if [ "${TOTAL%.*}" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "${TOTAL%.*}" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          mkdir -p coverage-out
          cp -r htmlcov coverage-out/
          cat > coverage-out/badge.json <<BADGE
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${TOTAL}%",
            "color": "${COLOR}"
          }
          BADGE

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: astrocyte-py/coverage-out/

  # astrocyte-gateway-py: shared with `release.yml` / `publish-astrocyte-gateway-py-image.yml` (see `gateway-publish-test-gate.yml`).
  gateway-publish-test-gate:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/gateway-publish-test-gate.yml

  adapters-integration-tavus:
    name: astrocyte-integration-tavus
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pytest (astrocyte-integration-tavus)
        working-directory: adapters-integration-py/astrocyte-integration-tavus
        run: |
          uv sync --extra dev
          uv run pytest tests -v --override-ini="addopts="

  # End-to-end: Claude Agent SDK + Astrocyte memory (real API calls).
  # Manual only (workflow_dispatch) — not run on push/PR. Not required for CI gate.
  # Install the official Claude Code CLI: the SDK’s bundled binary often fails on
  # headless Linux; tests pass cli_path when CI=true (see test file).
  e2e-claude-agent-sdk:
    name: e2e Claude Agent SDK
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude CLI
        run: claude -v

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          uv pip install claude-agent-sdk

      - name: Verify SDK + CLI resolution
        working-directory: astrocyte-py
        run: |
          echo "Python: $(python --version)"
          uv run python -c "import claude_agent_sdk; print(f'SDK: {claude_agent_sdk.__version__}')"
          echo "PATH claude: $(command -v claude)"
          claude -v

      - name: Run e2e tests
        working-directory: astrocyte-py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m pytest tests/test_e2e_claude_agent_sdk.py -v --timeout=120

  # End-to-end: Claude Managed Agents + Astrocyte memory (real API calls).
  # Runs only on main push or manual dispatch. Not required for CI gate.
  e2e-claude-managed-agents:
    name: e2e Claude Managed Agents
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          uv pip install anthropic

      - name: Verify SDK setup
        working-directory: astrocyte-py
        run: uv run python -c "import anthropic; print(f'anthropic SDK {anthropic.__version__} OK')"

      - name: Run e2e tests
        working-directory: astrocyte-py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m pytest tests/test_e2e_claude_managed_agents.py -v --timeout=120

  # Tavus CVI composer e2e lives in `.github/workflows/e2e-tavus-cvi.yml` (manual-only, single job).

  # In-memory benchmark smoke test — no API key, no Doppler, fast.
  # Catches regressions in the eval harness (benchmark adapter, judge, scorer)
  # on every PR without incurring real LLM costs.
  bench-smoke:
    name: Benchmark smoke test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch LoCoMo dataset
        working-directory: astrocyte-py
        run: make fetch-locomo

      - name: Install dependencies
        working-directory: astrocyte-py
        run: uv sync --extra dev

      - name: Run smoke benchmarks (in-memory, no API key)
        working-directory: astrocyte-py
        run: make bench-smoke

      - name: Regression gate (mock provider)
        working-directory: astrocyte-py
        run: |
          uv run python scripts/check_benchmark_regression.py \
            --baseline benchmarks/baselines-test-provider.json \
            --benchmarks locomo \
            --overall-tolerance 0.05 \
            --category-tolerance 0.07 \
            --metric-tolerance 0.05

  # Single green gate for branch protection (optional — pin this job instead of each matrix leg).
  ci:
    name: CI
    needs: [astrocyte-py, gateway-publish-test-gate, adapters-integration-tavus, bench-smoke]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
