name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Matches `requires-python` / classifiers in astrocyte-py/pyproject.toml
  astrocyte-py:
    name: astrocyte-py (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test astrocyte-py
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            uv run python -m pytest --cov=astrocyte --cov-report=json:coverage.json --cov-report=html:htmlcov --cov-report=term
          else
            uv run python -m pytest
          fi

      - name: Generate coverage badge JSON
        if: matrix.python-version == '3.12'
        working-directory: astrocyte-py
        run: |
          TOTAL=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          if [ "${TOTAL%.*}" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "${TOTAL%.*}" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          mkdir -p coverage-out
          cp -r htmlcov coverage-out/
          cat > coverage-out/badge.json <<BADGE
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${TOTAL}%",
            "color": "${COLOR}"
          }
          BADGE

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: astrocyte-py/coverage-out/

  # Shell, compose config, and astrocyte-rest tests — run once (same as former `make ci` minus astrocyte-py pytest).
  services-ci:
    name: Services CI (compose, shell, astrocyte-rest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run services checks
        run: make -C astrocyte-services-py ci-shell ci-compose ci-rest-tests

  # Single green gate for branch protection (optional — pin this job instead of each matrix leg).
  ci:
    name: CI
    needs: [astrocyte-py, services-ci]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
