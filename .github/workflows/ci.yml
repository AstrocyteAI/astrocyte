name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  # Matches `requires-python` / classifiers in astrocyte-py/pyproject.toml
  astrocyte-py:
    name: astrocyte-py (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test astrocyte-py
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            uv run python -m pytest --cov=astrocyte --cov-report=json:coverage.json --cov-report=html:htmlcov --cov-report=term
          else
            uv run python -m pytest
          fi

      - name: Generate coverage badge JSON
        if: matrix.python-version == '3.12'
        working-directory: astrocyte-py
        run: |
          TOTAL=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          if [ "${TOTAL%.*}" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "${TOTAL%.*}" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          mkdir -p coverage-out
          cp -r htmlcov coverage-out/
          cat > coverage-out/badge.json <<BADGE
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${TOTAL}%",
            "color": "${COLOR}"
          }
          BADGE

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: astrocyte-py/coverage-out/

  # Shell, compose config, and astrocyte-rest tests — run once (same as former `make ci` minus astrocyte-py pytest).
  services-ci:
    name: Services CI (compose, shell, astrocyte-rest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run services checks
        run: make -C astrocyte-services-py ci-shell ci-compose ci-rest-tests

  # Integration tests against real PostgreSQL + pgvector.
  pgvector-integration:
    name: pgvector integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: astrocyte
          POSTGRES_PASSWORD: astrocyte
          POSTGRES_DB: astrocyte
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrocyte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://astrocyte:astrocyte@localhost:5432/astrocyte
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test astrocyte-pgvector
        working-directory: astrocyte-services-py/astrocyte-pgvector
        run: uv sync --extra dev && uv run python -m pytest

  # End-to-end: Claude Agent SDK + Astrocyte memory (real API calls).
  # Runs only on main push or manual dispatch. Not required for CI gate.
  # Install the official Claude Code CLI: the SDK’s bundled binary often fails on
  # headless Linux; tests pass cli_path when CI=true (see test file).
  e2e-claude-agent-sdk:
    name: e2e Claude Agent SDK
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude CLI
        run: claude -v

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          uv pip install claude-agent-sdk

      - name: Verify SDK + CLI resolution
        working-directory: astrocyte-py
        run: |
          echo "Python: $(python --version)"
          uv run python -c "import claude_agent_sdk; print(f'SDK: {claude_agent_sdk.__version__}')"
          echo "PATH claude: $(command -v claude)"
          claude -v

      - name: Run e2e tests
        working-directory: astrocyte-py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m pytest tests/test_e2e_claude_agent_sdk.py -v --timeout=120

  # End-to-end: Claude Managed Agents + Astrocyte memory (real API calls).
  # Runs only on main push or manual dispatch. Not required for CI gate.
  e2e-claude-managed-agents:
    name: e2e Claude Managed Agents
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: |
          uv sync --extra dev
          uv pip install anthropic

      - name: Verify SDK setup
        working-directory: astrocyte-py
        run: uv run python -c "import anthropic; print(f'anthropic SDK {anthropic.__version__} OK')"

      - name: Run e2e tests
        working-directory: astrocyte-py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m pytest tests/test_e2e_claude_managed_agents.py -v --timeout=120

  # Single green gate for branch protection (optional — pin this job instead of each matrix leg).
  ci:
    name: CI
    needs: [astrocyte-py, services-ci, pgvector-integration]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
