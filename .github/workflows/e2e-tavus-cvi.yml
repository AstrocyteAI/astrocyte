# Tavus CVI composer e2e only — does not run astrocyte-py matrix, services, or pgvector.
# Actions → this workflow → "Run workflow" to execute a single job.
name: e2e Tavus CVI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  composer:
    name: e2e Tavus CVI composer
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: uv sync --extra dev

      - name: Run e2e tests
        working-directory: astrocyte-py
        env:
          TAVUS_API_KEY: ${{ secrets.TAVUS_API_KEY }}
          TAVUS_PERSONA_ID: ${{ secrets.TAVUS_PERSONA_ID }}
          TAVUS_REPLICA_ID: ${{ secrets.TAVUS_REPLICA_ID }}
        run: uv run python -m pytest tests/test_e2e_tavus_cvi_composer.py -v --timeout=120
