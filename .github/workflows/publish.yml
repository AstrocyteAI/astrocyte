name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # Triggers on version tags: v0.1.0, v1.0.0, etc.

permissions:
  id-token: write  # Required for Trusted Publishing (OIDC)
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for hatch-vcs to find tags

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: astrocyte-py
        run: uv sync --extra dev

      - name: Run tests
        working-directory: astrocyte-py
        run: uv run python -m pytest tests/ -x --tb=short

      - name: Run lint
        working-directory: astrocyte-py
        run: uv run ruff check astrocyte/ tests/

      - name: Build package
        working-directory: astrocyte-py
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: astrocyte-py/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release  # Must match the PyPI Trusted Publisher config
    permissions:
      id-token: write  # OIDC token for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check if version already exists on PyPI
        id: check
        run: |
          VERSION=$(ls dist/*.whl | head -1 | sed 's/.*astrocyte-\(.*\)-py3.*/\1/')
          echo "version=$VERSION"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/astrocyte/$VERSION/json")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already exists on PyPI — skipping upload"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not on PyPI — proceeding with upload"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
        # No token needed — uses Trusted Publishing (OIDC)
