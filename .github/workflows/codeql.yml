name: "CodeQL"

# Advanced CodeQL setup — replaces GitHub's "default setup" so we can
# pin a config file (``.github/codeql/codeql-config.yml``) that excludes
# the cookiecutter template tree from analysis. Cookiecutter templates
# contain unrendered Jinja2 placeholders that CodeQL cannot parse.
#
# Languages: python (framework + adapters), actions (workflow lint).
# JS/TS docs site is excluded by default — it has no application code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan to catch new advisories against unchanged code.
    - cron: "27 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
