name: Deploy docs (Starlight)

# DISABLED: GitHub Pages publish until the repository is public.
# This workflow never runs until you replace the branch below with [main, master],
# restore the `paths` filter, and (optionally) add `workflow_dispatch:` for manual runs.
on:
  push:
    branches:
      - __github_pages_deploy_disabled__
    # paths:
    #   - "docs/**"
    #   - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install & build
        working-directory: docs
        run: pnpm install --frozen-lockfile && pnpm build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
