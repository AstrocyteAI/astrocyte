name: "Astrocyte CodeQL config"

# Path exclusions for CodeQL analysis.
#
# Cookiecutter templates live under ``tooling/cookiecutter-astrocyte-adapter/``
# but use ``.py.jinja`` filenames (with a post-gen hook stripping the
# ``.jinja`` suffix) so the raw templates never look like Python to any
# scanner. No path-ignore needed for the template tree itself.
paths-ignore:
  # Test scaffolding (test doubles, mock stores, deliberate signature
  # shadowing) generates findings that aren't real production risk —
  # e.g. py/inheritance/signature-mismatch on InMemory* shadows used to
  # simulate legacy adapters. CodeQL is scoped to production code.
  - "**/tests/**"
  # portability.py is Astrocyte's dedicated CWE-022 security primitive.
  # py/path-injection flags the ``Path(path_str).expanduser().resolve()``
  # call because path_str is user-controlled — but the function exists
  # PRECISELY to neutralize that taint via allow-list containment with a
  # fail-closed default. Restructuring to satisfy the taint tracker
  # isn't possible (canonicalization must happen before containment can
  # be checked; symlinks/`..` aren't apparent in the input string).
  # Threat model is owned by tests/test_portability.py::TestPathContainment.
  - "astrocyte-py/astrocyte/portability.py"

# Rule-level exclusions.
query-filters:
  # actions/unpinned-tag flags every ``uses: actions/checkout@v4`` style
  # reference where the version is a tag rather than a SHA. SHA-pinning is
  # GitHub's stated best practice for high-security workflows, but for an
  # OSS project with Dependabot/Renovate managing action updates the
  # maintenance burden (SHA bumps on every action release) outweighs the
  # marginal threat model — third-party actions can also be retroactively
  # rewritten under a tag, but our supply-chain mitigations live elsewhere
  # (Dependabot, branch protection, required reviews). Disabled here so the
  # ~56 workflow files don't drown out higher-signal findings.
  - exclude:
      id: actions/unpinned-tag

  # py/import-of-mutable-attribute fires on every ``from X import Y`` where
  # Y is a module-level binding — including functions and classes, which
  # is 99% of normal Python imports. The query is technically correct that
  # reassigning the source attribute wouldn't be observed by the importer,
  # but that's the standard Python import contract and is almost never the
  # bug it claims to be. The query is genuinely useful for mutable globals
  # (dicts, counters, feature flags); for function/class imports it's pure
  # noise. We accept the rare-miss risk on actual mutable-global imports
  # in exchange for not rewriting every ``from utils import some_function``
  # call site to qualified module access. If a future case warrants the
  # query, narrow this exclusion with a ``paths:`` clause.
  - exclude:
      id: py/import-of-mutable-attribute
