# Hindsight-balanced benchmark configuration.
#
# Purpose:
# - Hindsight-parity bundle (agentic-reflect + cross-encoder + SFE-verbatim +
#   semantic/causal links + extraction-discipline prompt) PLUS the cheap subset
#   of adversarial defense from fast-recall (abstention floor + adversarial
#   prompt rule, NO premise verification).
#
# Hypothesis:
# - Hindsight-parity wins single-hop (0.85), multi-hop (0.54), open-domain
#   (0.31) but craters adversarial (0.37) because the extraction-discipline
#   prompt biases the agent toward extracting even when the question
#   presupposes something not in memory.
# - Quality-max enabled the *full* adversarial defense (incl. premise
#   verification + LLM disambiguation + larger pools) and collapsed to 42.5%
#   overall — too many compensations stacked.
# - The minimal repair: keep the hindsight-parity bundle, add only the cheap
#   adversarial defenses that worked for fast-recall.
#
# Single-variable diff vs config-hindsight-parity.yaml:
#   - adversarial_defense.abstention_enabled: false -> true
#   - adversarial_defense.abstention_floor: -> 0.2
#   - adversarial_defense.adversarial_prompt_enabled: false -> true
#   - (premise_verification stays OFF — caused OpenAI contention previously)
#
# Expected outcome (to be measured):
#   - adversarial: 0.37 -> ~0.65+ (closer to fast-recall's 0.71)
#   - single-hop / multi-hop / open-domain: hold near hindsight-parity levels
#   - overall: > 51.5% (beat fast-recall) is the ship gate

profile: research

provider_tier: storage

benchmark_preset:
  name: hindsight-balanced
  version: 1
  budget: mid
  mid:
    candidate_limit: 30
    graph_expansion_limit: 30
    rerank_top_k: 30
    max_tokens: 8192
    observation_weight: 0.15
    agentic_reflect_allowed: true

vector_store: postgres
vector_store_config:
  embedding_dimensions: 1536
  bootstrap_schema: false

document_store: postgres
document_store_config:
  embedding_dimensions: 1536
  bootstrap_schema: false

graph_store: age

wiki_store: postgres
wiki_store_config:
  bootstrap_schema: false

wiki_compile:
  enabled: true
  auto_start: true
  size_threshold: 50

entity_resolution:
  enabled: true
  enable_llm_disambiguation: false
  canonical_resolution: true

async_tasks:
  enabled: true
  backend: pgqueuer
  install_on_start: true
  auto_start_worker: true

spreading_activation:
  enabled: true
  expansion_limit: 30

semantic_link_graph:
  enabled: true
  top_k: 5
  similarity_threshold: 0.7

causal_links:
  enabled: true
  max_pairs_per_memory: 2
  min_confidence: 0.6

agentic_reflect:
  enabled: true
  max_iterations: 10
  recall_step_max_results: 10
  max_evidence_pool_size: 30

cross_encoder_rerank:
  enabled: true
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 30
  force_cpu: false

# Single-variable diff vs hindsight-parity:
#   abstention floor + adversarial system-prompt rule, NO premise verification.
adversarial_defense:
  abstention_enabled: true
  abstention_floor: 0.2
  premise_verification_enabled: false
  adversarial_prompt_enabled: true

structured_fact_extraction:
  enabled: true
  extraction_mode: verbatim
  max_facts_per_call: 30
  chunk_strategy: paragraph

query_analyzer:
  enabled: false

llm_provider: openai
llm_provider_config:
  api_key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
  embedding_model: text-embedding-3-small

barriers:
  pii:
    mode: disabled
  validation:
    reject_empty_content: true

homeostasis:
  recall_max_tokens: 16384
  reflect_max_tokens: 16384
  rate_limits:
    retain_per_minute: 500
    recall_per_minute: 500
    reflect_per_minute: 200

signal_quality:
  dedup:
    enabled: false
  noisy_bank:
    enabled: false

escalation:
  degraded_mode: error

observability:
  otel_enabled: false
  prometheus_enabled: false
