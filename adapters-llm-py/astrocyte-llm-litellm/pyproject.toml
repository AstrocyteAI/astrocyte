[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "astrocyte-llm-litellm"
dynamic = ["version"]
description = "LiteLLM LLMProvider adapter for Astrocyte — 100+ models via one gateway"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "astrocyte>=0.7.0,<0.9",
    # litellm version ceiling: 1.83.1+ strict-pins python-dotenv==1.0.1,
    # which conflicts with our python-dotenv>=1.2.2 security floor below.
    # 1.83.0 is the last version with the flexible python-dotenv>=0.2.0 pin.
    #
    # Two open Dependabot advisories (as of 2026-04-25):
    #   GHSA SQL injection in Proxy API key verification (Critical)
    #   GHSA SSTI in /prompts/test endpoint (High)
    # Both affect the LiteLLM *proxy server* component. Astrocyte uses
    # LiteLLM as a client library only (litellm.completion / litellm.embedding)
    # and never instantiates or exposes the proxy server — so these CVEs are
    # not exploitable in this adapter.
    #
    # When litellm releases a version that both fixes the proxy CVEs AND
    # relaxes the python-dotenv pin back to >=1.2.2 (or drops it), update
    # this ceiling and the python-dotenv floor below.
    "litellm>=1.40,<=1.83.0",
    # Security floor for aiohttp — litellm pulls it transitively. Pinned
    # here (not left to transitive resolution) because several GHSA
    # advisories affect versions <3.13.5 (header smuggling, SSRF, DoS).
    # Revisit on every Dependabot aiohttp alert; bump this floor.
    "aiohttp>=3.13.5",
    # Security floor for python-dotenv. Same upstream-pinning pattern as
    # aiohttp above: litellm 1.83.x strict-pins python-dotenv==1.0.1,
    # which is affected by a Dependabot advisory requiring >=1.2.2.
    # Adding this floor forces uv to pick a compatible litellm — 1.82.x
    # (flexible python-dotenv>=0.2.0). When a future litellm 1.83.11+
    # relaxes the pin, resolution can climb back up. Revisit every
    # python-dotenv alert and bump this floor.
    "python-dotenv>=1.2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.2",
]

[project.entry-points."astrocyte.llm_providers"]
litellm = "astrocyte_llm_litellm:LiteLLMProvider"

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../.." }  # Git root is two levels up

[tool.hatch.build.targets.wheel]
packages = ["astrocyte_llm_litellm"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-x --timeout=60 --tb=short"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I"]

[tool.uv.sources]
astrocyte = { path = "../../astrocyte-py", editable = true }
