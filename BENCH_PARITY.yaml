# BENCH_PARITY.yaml — bench-cycle parity for released package versions.
#
# Each `releases[]` row is appended by `make release-mark` and records:
#   - package + version released to PyPI / GHCR
#   - bench_cycle (the ship_label of the cycle that produced the embedded behavior)
#   - bench_tag + bench_commit (the resolved annotated git tag for that cycle, for
#     reproducibility — `git checkout <bench_commit>` to verify the score)
#   - frozen scores from the cycle's shipped run set at release time
#
# The README badge writer
# (`scripts/archive_bench_results._build_badge_payload`) prefers the most recent
# astrocyte release's scores over raw cycle data — so the badge always reflects
# what `pip install astrocyte` actually produces, not whatever ablation ran last
# night.
#
# Live trajectory (canonical, real-time source):
#   https://pub-fd2a5bf01e5b443085a14aedb49c4206.r2.dev/trajectory/locomo.json
#   https://pub-fd2a5bf01e5b443085a14aedb49c4206.r2.dev/trajectory/longmemeval.json
#
# This file is a curated, version-anchored snapshot. Do not hand-edit unless
# you're correcting a release-time mistake; use `make release-mark` to add rows.

