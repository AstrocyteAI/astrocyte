# https://pre-commit.com
# Install (from repo root, after `uv sync --extra dev` in astrocyte-py):
#   uv run --project astrocyte-py pre-commit install
#
# Mirrors CI / publish: `uv run ruff check astrocyte/ tests/` in astrocyte-py/
#
# CodeQL is not run here: it builds a DB and analyzes the whole tree (minutes + large CLI).
# Use repo **Settings → Code security → Code scanning** (GitHub default/setup) for CodeQL in CI.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^astrocyte-py/(astrocyte|tests)/.*\.py$
