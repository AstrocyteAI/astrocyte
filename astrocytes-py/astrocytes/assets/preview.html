<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
  .panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 32px; }
  .light { background: #fff; color: #1c1e21; }
  .dark  { background: #1b1b1d; color: #e3e3e3; }
  .mark  { width: 220px; height: 220px; }
  .row   { display: flex; align-items: center; gap: 14px; }
  .row img { width: 44px; height: 44px; }
  .row span { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
  .sm img { width: 28px; height: 28px; }
  .sm span { font-size: 17px; }
  .xs img { width: 16px; height: 16px; }
  .xs span { font-size: 12px; }
  .label { font-size: 11px; opacity: 0.35; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="panel light">
    <div class="label">Light</div>
    <img class="mark" src="logo.svg">
    <div class="row"><img src="logo.svg"><span>astrocytes</span></div>
    <div class="row sm"><img src="logo.svg"><span>astrocytes</span></div>
    <div class="row xs"><img src="logo.svg"><span>astrocytes</span></div>
  </div>
  <div class="panel dark">
    <div class="label">Dark</div>
    <img class="mark" src="logo-dark.svg">
    <div class="row"><img src="logo-dark.svg"><span>astrocytes</span></div>
    <div class="row sm"><img src="logo-dark.svg"><span>astrocytes</span></div>
    <div class="row xs"><img src="logo-dark.svg"><span>astrocytes</span></div>
  </div>
</body>
</html>
