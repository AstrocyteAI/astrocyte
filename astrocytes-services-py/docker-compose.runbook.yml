# Optional override: mount runbook config (bootstrap_schema: false) into astrocytes-rest.
# Use after applying SQL migrations. Does not change the default `docker-compose.yml` quick path.
#
#   docker compose -f docker-compose.yml -f docker-compose.runbook.yml up --build
#
services:
  astrocytes-rest:
    volumes:
      - ./config.runbook.example.yaml:/etc/astrocytes/config.yaml:ro
    environment:
      ASTROCYTES_CONFIG_PATH: /etc/astrocytes/config.yaml
