# Gateway + PostgreSQL (pgvector + Apache AGE). Run from this directory:
#   cp .env.example .env   # optional: override secrets and ports
#   docker compose up --build
# Or from repo root:
#   docker compose -f astrocyte-services-py/docker-compose.yml --env-file astrocyte-services-py/.env up --build
#
# Postgres is reachable on host port POSTGRES_PUBLISH_PORT (default 5433). The API is on ASTROCYTE_HTTP_PUBLISH_PORT (default 8080).
services:
  postgres:
    image: ${ASTROCYTE_POSTGRES_IMAGE:-astrocyte/astrocyte-postgres:local}
    build:
      context: ..
      dockerfile: docker/astrocyte-postgres/Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astrocyte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astrocyte}
      POSTGRES_DB: ${POSTGRES_DB:-astrocyte}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 5

  astrocyte-gateway-py:
    build:
      context: ..
      dockerfile: astrocyte-services-py/astrocyte-gateway-py/Dockerfile
    ports:
      - "${ASTROCYTE_HTTP_PUBLISH_PORT:-8080}:${ASTROCYTE_PORT:-8080}"
    environment:
      # Entry-point names registered by adapters-storage-py/astrocyte-postgres
      # are `postgres` for both vector and wiki stores. `pgvector` is kept as
      # a backwards-compat alias on the vector store; the wiki store has no
      # alias, so the canonical `postgres` is required there.
      ASTROCYTE_VECTOR_STORE: ${ASTROCYTE_VECTOR_STORE:-postgres}
      ASTROCYTE_GRAPH_STORE: ${ASTROCYTE_GRAPH_STORE:-age}
      ASTROCYTE_WIKI_STORE: ${ASTROCYTE_WIKI_STORE:-postgres}
      ASTROCYTE_WIKI_COMPILE_ENABLED: ${ASTROCYTE_WIKI_COMPILE_ENABLED:-true}
      ASTROCYTE_WIKI_COMPILE_AUTO_START: ${ASTROCYTE_WIKI_COMPILE_AUTO_START:-true}
      ASTROCYTE_ENTITY_RESOLUTION_ENABLED: ${ASTROCYTE_ENTITY_RESOLUTION_ENABLED:-true}
      ASTROCYTE_ASYNC_TASKS_ENABLED: ${ASTROCYTE_ASYNC_TASKS_ENABLED:-true}
      ASTROCYTE_ASYNC_TASKS_BACKEND: ${ASTROCYTE_ASYNC_TASKS_BACKEND:-pgqueuer}
      ASTROCYTE_ASYNC_TASKS_INSTALL_ON_START: ${ASTROCYTE_ASYNC_TASKS_INSTALL_ON_START:-true}
      ASTROCYTE_ASYNC_TASKS_AUTO_START_WORKER: ${ASTROCYTE_ASYNC_TASKS_AUTO_START_WORKER:-true}
      # In-cluster DSN only: hostname must be `postgres`. Do not reuse host-side DATABASE_URL
      # (e.g. 127.0.0.1:5433) here — Compose would pass it into this container and health checks hang.
      # Prefer ASTROCYTE_GATEWAY_DATABASE_URL; ASTROCYTE_REST_DATABASE_URL kept for existing .env files.
      DATABASE_URL: ${ASTROCYTE_GATEWAY_DATABASE_URL:-${ASTROCYTE_REST_DATABASE_URL:-postgresql://${POSTGRES_USER:-astrocyte}:${POSTGRES_PASSWORD:-astrocyte}@postgres:5432/${POSTGRES_DB:-astrocyte}}}
      ASTROCYTE_HOST: ${ASTROCYTE_HOST:-0.0.0.0}
      ASTROCYTE_PORT: ${ASTROCYTE_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
