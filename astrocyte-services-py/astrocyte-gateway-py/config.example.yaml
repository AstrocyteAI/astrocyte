# Example Astrocyte config for `astrocyte-gateway-py` (Tier 1 / storage).
# Optional: mip_config_path: /path/to/mip.yaml
# Use: ASTROCYTE_CONFIG_PATH=/path/to/this/file astrocyte-gateway-py
#
# Provider names resolve via Python entry points (see `astrocyte-py` pyproject.toml)
# or as `package.module:ClassName` for custom classes.

provider_tier: storage

# Built-in names: in_memory (vector/graph/document), mock (LLM)
vector_store: in_memory
llm_provider: mock

# Optional Tier 1 add-ons (omit or set null to disable)
# graph_store: in_memory
# document_store: in_memory

# Optional constructor kwargs passed to the provider class
# vector_store_config: {}
# llm_provider_config:
#   default_response: "Mock LLM response"

barriers:
  pii:
    mode: disabled

escalation:
  degraded_mode: error

access_control:
  enabled: false
  # When enabled: default_policy deny | open | owner_only
  # default_policy: deny

# Declarative grants (merged with banks.<id>.access). Example when access_control.enabled is true:
# access_grants:
#   - bank_id: default
#     principal: agent:my-service
#     permissions: [read, write]
# banks:
#   other_bank:
#     access:
#       - principal: user:alice
#         permissions: [read]
