apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astrocyte-gateway-py.fullname" . }}
  labels:
    {{- include "astrocyte-gateway-py.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "astrocyte-gateway-py.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "astrocyte-gateway-py.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASTROCYTE_HOST
              value: "0.0.0.0"
            - name: ASTROCYTE_PORT
              value: "8080"
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml .Values.extraEnvFrom | nindent 12 }}
          {{- end }}
          # /live = process is up (liveness → restart on hang).
          # /health = DB + vector store reachable (readiness → gate traffic
          # until migrations/connections are ready).
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.configMapName }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          {{- end }}
      {{- if .Values.configMapName }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.configMapName }}
      {{- end }}
