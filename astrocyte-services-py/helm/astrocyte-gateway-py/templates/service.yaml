apiVersion: v1
kind: Service
metadata:
  name: {{ include "astrocyte-gateway-py.fullname" . }}
  labels:
    {{- include "astrocyte-gateway-py.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "astrocyte-gateway-py.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
