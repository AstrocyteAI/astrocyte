# Example Astrocyte config for the runbook
# (Postgres + pgvector + Apache AGE + PgQueuer + durable wiki, no runtime DDL for vectors/wiki).
# Use with docker-compose.runbook.yml so the container sees this file at ASTROCYTE_CONFIG_PATH.
# Copy and edit if you need different providers or dimensions.

provider_tier: storage
vector_store: postgres
wiki_store: postgres
llm_provider: mock

vector_store_config:
  bootstrap_schema: false
  embedding_dimensions: 128

# graph_store_config block removed in M9 (ADR-008). Tier-2 graph operations
# now live inside the Postgres adapter (flat tables: section_links,
# section_entities, unit_links, unit_entities) — no separate graph_store
# is required.

wiki_store_config:
  bootstrap_schema: false

wiki_compile:
  enabled: true
  auto_start: true
  size_threshold: 50

entity_resolution:
  enabled: true

async_tasks:
  enabled: true
  backend: pgqueuer
  install_on_start: true
  auto_start_worker: true
  batch_size: 10
